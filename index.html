<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pratik Chandra Thakur | Security Analyst & Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              primary: {
                400: 'rgb(var(--color-primary-400) / <alpha-value>)',
                500: 'rgb(var(--color-primary-500) / <alpha-value>)',
                600: 'rgb(var(--color-primary-600) / <alpha-value>)',
                900: 'rgb(var(--color-primary-900) / <alpha-value>)',
              },
              cyber: {
                black: '#0a0a0a',
                dark: '#0f172a',
                gray: '#1e293b',
                // primary: '#10b981', // Removed in favor of dynamic primary
                accent: '#8b5cf6', // Violet 500
                text: '#e2e8f0',
                muted: '#94a3b8'
              }
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glitch': 'glitch 1s linear infinite',
            },
            keyframes: {
              glitch: {
                '2%, 64%': { transform: 'translate(2px,0) skew(0deg)' },
                '4%, 60%': { transform: 'translate(-2px,0) skew(0deg)' },
                '62%': { transform: 'translate(0,0) skew(5deg)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Default Emerald Values */
        --color-primary-400: 52 211 153;
        --color-primary-500: 16 185 129;
        --color-primary-600: 5 150 105;
        --color-primary-900: 6 78 59;
      }
      body {
        background-color: #020617;
        color: #e2e8f0;
        overflow-x: hidden;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .glass-panel {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .neon-border {
        box-shadow: 0 0 5px theme('colors.primary.500'), 0 0 10px theme('colors.primary.500');
      }
      /* Custom Terminal Scrollbar */
      .terminal-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .terminal-scrollbar::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5); 
      }
      .terminal-scrollbar::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 3px;
      }
      .terminal-scrollbar::-webkit-scrollbar-thumb:hover {
        background: theme('colors.primary.500'); 
      }
      ::selection {
        background: theme('colors.primary.500');
        color: #000;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
